<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veículos</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header>
  <div><strong>Sistema de Transporte</strong></div>
  <nav>
    <a href="index.html">Dashboard</a>
    <a href="clientes.html">Clientes</a>
    <a href="veiculos.html">Veículos</a>
    <a href="agendamentos.html">Agendamentos</a>
    <a href="contratos.html">Contratos</a>
    <a href="config.html">Contrato padrão</a>
    <a href="#" onclick="logout()">Sair</a>
  </nav>
</header>
  <div class="container">
    <div class="card">
      <h1>Novo veículo</h1>
      <form id="veiculoForm" class="grid grid-2">
        <div><label>Nome</label><input id="nome" required /></div>
        <div><label>Placa</label><input id="placa" /></div>
        <div><label>Modelo</label><input id="modelo" /></div>
        <div><label>Capacidade</label><input id="capacidade" type="number" /></div>
        <div><label>Ano</label><input id="ano" type="number" /></div>
        <div>
          <label>Status</label>
          <select id="status">
            <option value="ativo">Ativo</option>
            <option value="manutencao">Manutenção</option>
            <option value="inativo">Inativo</option>
          </select>
        </div>
        <div><label>Observações</label><input id="observacoes" /></div>
        <div><button type="submit">Salvar veículo</button></div>
      </form>
    </div>

    <div class="card">
      <h2>Lista de veículos</h2>
      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>Placa</th>
            <th>Modelo</th>
            <th>Capacidade</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="tbVeiculos"></tbody>
      </table>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/veiculos.js"></script>
</body>
</html>
