<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contratos</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header>
  <div><strong>Sistema de Transporte</strong></div>
  <nav>
    <a href="index.html">Dashboard</a>
    <a href="clientes.html">Clientes</a>
    <a href="veiculos.html">Veículos</a>
    <a href="agendamentos.html">Agendamentos</a>
    <a href="contratos.html">Contratos</a>
    <a href="config.html">Contrato padrão</a>
    <a href="#" onclick="logout()">Sair</a>
  </nav>
</header>
  <div class="container">
    <div class="card">
      <h1>Gerar contrato</h1>
      <label>Agendamento</label>
      <select id="agendamento_id"></select>
      <button id="btnGerar">Gerar contrato</button>
      <button id="btnImprimir" class="secondary">Imprimir / Salvar PDF</button>
    </div>

    <div class="card">
      <h2>Prévia</h2>
      <pre id="previewContrato"></pre>
    </div>

    <div class="card">
      <h2>Contratos gerados</h2>
      <table>
        <thead>
          <tr>
            <th>Número</th>
            <th>Agendamento</th>
            <th>Status</th>
            <th>Data</th>
          </tr>
        </thead>
        <tbody id="tbContratos"></tbody>
      </table>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/contratos.js"></script>
</body>
</html>
